name: AnarchyItemGuard
version: 1.0.0
main: me.stozeks.anarchyitemguard.core.AnarchyItemGuardPlugin
api-version: 1.16
author: Stozeks
description: Prevents unauthorized use of configurable items inside WorldGuard regions.

depend:
  - WorldGuard

commands:
  aig:
    description: Main AnarchyItemGuard command.
    usage: /aig reload

permissions:
  anarchyitemguard.reload:
    description: Allows reloading the AnarchyItemGuard configuration.
    default: op